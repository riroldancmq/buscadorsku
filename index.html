<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Buscador SKU</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f14;
    --surface: #1a1a24;
    --card: #22222f;
    --accent: #f5a623;
    --accent2: #ff6b35;
    --text: #e8e8f0;
    --muted: #7878a0;
    --border: #2e2e42;
    --green: #2dd4a0;
    --modal-bg: #181820;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ENCABEZADO */
  .header {
    background: linear-gradient(135deg, #1a1a24 0%, #0f0f18 100%);
    border-bottom: 2px solid var(--accent);
    padding: 16px 16px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(0,0,0,0.6);
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .logo {
    width: 38px;
    height: 38px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: #000;
    flex-shrink: 0;
  }

  .header-title {
    flex: 1;
  }

  .header-title h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 26px;
    letter-spacing: 0.5px;
    line-height: 1;
    color: var(--text);
  }

  .header-title span {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .add-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 18px;
  }

  .add-btn:active { transform: scale(0.96); }

  /* BUSCADOR */
  .search-area {
    padding: 0 0 14px;
  }

  .search-wrap {
    position: relative;
    margin-bottom: 10px;
  }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 17px;
    padding: 13px 44px 13px 42px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus {
    border-color: var(--accent);
  }

  .search-input::placeholder { color: var(--muted); }

  .clear-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    display: none;
    padding: 4px;
  }

  .filter-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }

  .filter-row::-webkit-scrollbar { display: none; }

  .filter-chip {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 15px;
    padding: 7px 14px;
  }

  .filter-chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  .filter-group-panel {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    padding: 10px 0 4px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
    animation: fadeIn 0.15s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .filter-sub-chip {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 15px;
    padding: 7px 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }

  .filter-sub-chip.active,
  .filter-sub-chip:active {
    background: var(--chip-color, var(--accent));
    border-color: var(--chip-color, var(--accent));
    color: #000;
  }

  /* CONTADOR DE RESULTADOS */
  .results-bar {
    padding: 10px 16px;
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .results-count {
    color: var(--accent);
  }

  /* LISTA DE PRODUCTOS */
  .list {
    padding: 0 12px 100px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    gap: 12px;
    -webkit-tap-highlight-color: transparent;
  }

  .card:active {
    transform: scale(0.98);
    border-color: var(--accent);
  }

  .card-sku {
    background: var(--surface);
    border-radius: 8px;
    padding: 6px 10px;
    text-align: center;
    min-width: 72px;
    flex-shrink: 0;
  }

  .card-sku .sku-label {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: 'Barlow Condensed', sans-serif;
  }

  .card-sku .sku-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 28px;
    color: var(--accent);
    line-height: 1.2;
  }

  .card-body {
    flex: 1;
    min-width: 0;
  }

  .card-desc {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 20px;
    line-height: 1.2;
    margin-bottom: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .pill {
    background: var(--surface);
    border-radius: 5px;
    padding: 3px 9px;
    font-size: 13px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .pill .val {
    color: var(--green);
    font-size: 15px;
  }

  .card-arrow {
    color: var(--muted);
    font-size: 18px;
    flex-shrink: 0;
  }

  /* ESTADO VACÍO (sin resultados) */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty .big {
    font-size: 48px;
    margin-bottom: 16px;
  }

  .empty h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text);
  }

  /* VENTANA EMERGENTE */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--modal-bg);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 0 0 40px;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  }

  .modal-overlay.open .modal {
    transform: translateY(0);
  }

  .modal-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 0;
  }

  .modal-header {
    padding: 16px 20px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .modal-sku-badge {
    background: var(--accent);
    color: #000;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 24px;
    padding: 6px 16px;
    border-radius: 8px;
    letter-spacing: 0.5px;
  }

  .modal-close {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 32px;
    height: 32px;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .modal-title {
    padding: 12px 20px 0;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 32px;
    line-height: 1.1;
    color: var(--text);
  }

  .modal-divider {
    height: 1px;
    background: var(--border);
    margin: 16px 20px;
  }

  .modal-section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 20px 12px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 0 20px;
  }

  .stat-card {
    background: var(--surface);
    border-radius: 12px;
    padding: 14px 10px;
    text-align: center;
    border: 1.5px solid var(--border);
  }

  .stat-card.highlight {
    background: linear-gradient(135deg, rgba(245,166,35,0.15), rgba(255,107,53,0.1));
    border-color: var(--accent);
  }

  .stat-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 40px;
    line-height: 1;
    color: var(--green);
    margin-bottom: 6px;
  }

  .stat-card.highlight .stat-val {
    color: var(--accent);
  }

  .stat-lbl {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    line-height: 1.2;
  }

  .visual-paleta {
    padding: 16px 20px 0;
  }

  .paleta-drawing {
    display: flex;
    align-items: flex-end;
    gap: 20px;
    margin-top: 10px;
  }

  .paleta-svg-wrap {
    flex-shrink: 0;
  }

  .paleta-legend {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding-bottom: 4px;
  }

  .paleta-legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    color: var(--muted);
  }

  .paleta-legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .paleta-legend-val {
    color: var(--text);
    font-weight: 700;
    font-size: 20px;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    padding: 20px 20px 0;
  }

  .btn-edit {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 19px;
    padding: 14px;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .btn-edit:hover { border-color: var(--accent); }

  .btn-delete {
    background: rgba(255,80,80,0.12);
    border: 1.5px solid rgba(255,80,80,0.3);
    border-radius: 10px;
    color: #ff6060;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 19px;
    padding: 14px 20px;
    cursor: pointer;
  }

  /* FORMULARIO DE PRODUCTO */
  .form-group {
    padding: 0 20px 14px;
  }

  .form-label {
    display: block;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 17px;
    padding: 13px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus { border-color: var(--accent); }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    padding: 0 20px 14px;
  }

  .form-row .form-group {
    padding: 0;
  }

  .btn-save {
    width: calc(100% - 40px);
    margin: 8px 20px 0;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 22px;
    padding: 16px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.2s;
  }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--green);
    color: #000;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 17px;
    padding: 12px 26px;
    border-radius: 100px;
    z-index: 999;
    transition: transform 0.3s;
    white-space: nowrap;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  .no-data {
    font-size: 13px;
    color: #ff6060;
    background: rgba(255,96,96,0.1);
    border-radius: 6px;
    padding: 4px 8px;
    display: inline-block;
  }

  .export-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--green);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 0 12px;
    height: 42px;
    cursor: pointer;
    display: none;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
    white-space: nowrap;
    transition: border-color 0.2s;
  }

  .export-btn:active { transform: scale(0.96); }

  /* BOTÓN ADMINISTRADOR */
  .admin-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    width: 42px;
    height: 42px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: border-color 0.2s;
  }

  .admin-btn.active {
    border-color: var(--accent);
    background: rgba(245,166,35,0.15);
  }

  /* PANTALLA DE LOGIN */
  .login-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .login-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .login-box {
    background: var(--modal-bg);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 32px 28px;
    width: 88%;
    max-width: 340px;
    text-align: center;
    transform: scale(0.95);
    transition: transform 0.2s;
  }

  .login-overlay.open .login-box {
    transform: scale(1);
  }

  .login-icon {
    font-size: 40px;
    margin-bottom: 12px;
  }

  .login-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 24px;
    color: var(--text);
    margin-bottom: 6px;
  }

  .login-sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .login-input {
    width: 100%;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 18px;
    padding: 13px 16px;
    outline: none;
    text-align: center;
    letter-spacing: 3px;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }

  .login-input:focus { border-color: var(--accent); }

  .login-input.error {
    border-color: #ff6060;
    animation: shake 0.3s ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-8px); }
    75%      { transform: translateX(8px); }
  }

  .login-btn {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 20px;
    padding: 14px;
    cursor: pointer;
    margin-bottom: 12px;
  }

  .login-cancel {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    cursor: pointer;
    padding: 6px;
  }

  .admin-badge {
    display: none;
    background: var(--accent);
    color: #000;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">📦</div>
    <div class="header-title">
      <h1>Buscador SKU</h1>
      <span>Sistema de productos</span>
    </div>
    <button class="add-btn" id="addBtn" onclick="openAdd()" style="display:none">+ Nuevo</button>
    <button class="export-btn" id="exportBtn" onclick="exportarHTML()" style="display:none" title="Exportar HTML">⬇️ HTML</button>
    <button class="admin-btn" id="loginBtn" onclick="toggleAdmin()">🔒</button>
  </div>
  <div class="search-area">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" type="text" placeholder="Buscar por descripción, SKU o marca..." oninput="onSearch()" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
    </div>
    <div class="filter-row" id="filterRow"></div>
  </div>
</div>

<div class="results-bar">
  <span id="resultsText">Cargando...</span>
  <span style="color:var(--muted);font-size:13px">SKU BÚSQUEDA</span>
</div>

<div class="list" id="list"></div>

<!-- VENTANA DE DETALLE DEL PRODUCTO -->
<div class="modal-overlay" id="detailModal" onclick="closeModal(event, 'detailModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-sku-badge" id="mSku"></span>
      <button class="modal-close" onclick="closeModalById('detailModal')">✕</button>
    </div>
    <div class="modal-title" id="mDesc"></div>
    <div class="modal-divider"></div>
    <div class="modal-section-title">DETALLE DE PALETA</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-val" id="mPisos">—</div>
        <div class="stat-lbl">Pisos por Paleta</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="mPacksPiso">—</div>
        <div class="stat-lbl">Bultos por Piso</div>
      </div>
      <div class="stat-card highlight">
        <div class="stat-val" id="mPacksPaleta">—</div>
        <div class="stat-lbl">Bultos Paleta Completa</div>
      </div>
    </div>
    <div class="visual-paleta" id="visualPaleta"></div>
    <div class="modal-divider"></div>
    <div class="modal-actions" id="adminActions" style="display:none">
      <button class="btn-edit" onclick="openEdit(currentIdx)">✏️ Editar producto</button>
      <button class="btn-delete" onclick="deleteProduct(currentIdx)">🗑️</button>
    </div>
  </div>
</div>

<!-- FORMULARIO: AGREGAR / EDITAR PRODUCTO -->
<div class="modal-overlay" id="formModal" onclick="closeModal(event, 'formModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-sku-badge" id="formTitle">NUEVO PRODUCTO</span>
      <button class="modal-close" onclick="closeModalById('formModal')">✕</button>
    </div>
    <div style="height:16px"></div>
    <div class="form-group">
      <label class="form-label">SKU / Código</label>
      <input class="form-input" id="fSku" type="text" placeholder="Ej: 1234.0">
    </div>
    <div class="form-group">

function formatSku(sku) {
  if (!sku || sku === 'NaN' || sku === 'nan') return '—';
  // Elimina todos los puntos del código (ej: "352.0" → "352", "22.334" → "22334")
  return String(sku).replace(/\./g, '');
}

// ---- AUTENTICACIÓN DE ADMINISTRADOR ----
const ADMIN_PASS = 'cdmercado26';
let isAdmin = false;

function toggleAdmin() {
  if (isAdmin) {
    // Cerrar sesión
    isAdmin = false;
    applyAdminUI();
    showToast('🔒 Sesión cerrada');
  } else {
    // Mostrar pantalla de login
    document.getElementById('loginInput').value = '';
    document.getElementById('loginInput').classList.remove('error');
    document.getElementById('loginIcon').textContent = '🔐';
    document.getElementById('loginTitle').textContent = 'Acceso Admin';

  }
}

function doLogin() {
  const val = document.getElementById('loginInput').value;
  if (val === ADMIN_PASS) {
    isAdmin = true;
    document.getElementById('loginModal').classList.remove('open');
    applyAdminUI();
    showToast('✅ Modo administrador activo');
  } else {
    const inp = document.getElementById('loginInput');
    inp.classList.add('error');
    inp.value = '';
    document.getElementById('loginIcon').textContent = '❌';
    document.getElementById('loginSub').textContent = 'Contraseña incorrecta, intentá de nuevo';

      inp.classList.remove('error');
      document.getElementById('loginIcon').textContent = '🔐';
      document.getElementById('loginSub').textContent = 'Ingresá la contraseña para editar';
    }, 1500);
  }
}

function closeLogin() {
  document.getElementById('loginModal').classList.remove('open');
}

function applyAdminUI() {
  const addBtn = document.getElementById('addBtn');
  const exportBtn = document.getElementById('exportBtn');
  const loginBtn = document.getElementById('loginBtn');
  const adminActions = document.getElementById('adminActions');
  if (isAdmin) {

    exportBtn.style.display = 'flex';
    loginBtn.textContent = '🔓';
    loginBtn.classList.add('active');
    if (adminActions) adminActions.style.display = 'flex';
  } else {
    addBtn.style.display = 'none';
    exportBtn.style.display = 'none';
    loginBtn.textContent = '🔒';
    loginBtn.classList.remove('active');
    if (adminActions) adminActions.style.display = 'none';
  }
}

async function iniciarApp() {
  // Mostrar datos base de inmediato para no quedar en blanco
  db = [...DB_BASE];
  buildFilters();
  render();

  // Actualizar desde JSONBin en segundo plano
  try {
    const resp = await fetch(JSONBIN_URL + '/latest', {
      headers: { 'X-Access-Key': JSONBIN_KEY }
    });
    if (!resp.ok) throw new Error('JSONBin status ' + resp.status);
    const data = await resp.json();
    const record = data.record;
    if (Array.isArray(record) && record.length > 0) {
      db = record;
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); } catch(e) {}
      render();
    } else {
      // JSONBin vacío: subir datos base
      await subirAJSONBin(DB_BASE);
      db = [...DB_BASE];
    }
  } catch(err) {
    console.warn('JSONBin no disponible:', err.message);
  }
}

async function subirAJSONBin(datos) {
  const resp = await fetch(JSONBIN_URL, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Access-Key': JSONBIN_KEY },
    body: JSON.stringify(datos)
  });
  if (!resp.ok) throw new Error('Error guardando: ' + resp.status);
  return resp.json();
}

async function saveData() {
  // Guardar localmente siempre
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); } catch(e) {}
  if (!isAdmin) return;
  try {
    showToast('💾 Guardando en la nube...');
    const resp = await fetch(JSONBIN_URL, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Access-Key': JSONBIN_KEY,
        'X-Bin-Versioning': 'false'
      },
      body: JSON.stringify(db)
    });
    const text = await resp.text();
    console.log('JSONBin respuesta:', resp.status, text.substring(0, 200));
    if (!resp.ok) {
      throw new Error(`Error ${resp.status}: ${text.substring(0, 100)}`);
    }
    showToast('✅ Guardado en la nube correctamente');
  } catch(err) {
    console.error('Error guardando en JSONBin:', err);
    showToast('⚠️ Solo guardado local. Error: ' + err.message.substring(0, 50));
  }
}

// ---- ESTADO DE LA APLICACIÓN ----
let query = '';
let activeFilter = 'TODOS'; // guarda la palabra clave del filtro activo
let activeGroup = null;     // guarda el grupo de filtro abierto
let currentIdx = -1;
let editIdx = -1;
let filtered = [];

// ---- CONSTRUCCIÓN DE LOS FILTROS ----
const filterRow = document.getElementById('filterRow');

function buildFilters() {
  filterRow.innerHTML = '';

  // Chip "TODOS" (muestra todos los productos)
  const todosChip = document.createElement('button');
  todosChip.className = 'filter-chip active';
  todosChip.textContent = 'TODOS';
  todosChip.onclick = () => {
    activeFilter = 'TODOS';
    activeGroup = null;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.filter-group-panel').forEach(p => p.remove());
    todosChip.classList.add('active');
    render();
  };
  filterRow.appendChild(todosChip);

  // Chips de cada categoría (Cervezas, Gaseosas, etc.)
  FILTER_GROUPS.forEach(group => {
    const groupChip = document.createElement('button');
    groupChip.className = 'filter-chip filter-group-chip';
    groupChip.textContent = group.label;
    groupChip.style.borderColor = group.color + '55';
    groupChip.style.color = group.color;
    groupChip.dataset.group = group.label;

    groupChip.onclick = () => {
      const isOpen = activeGroup === group.label;
      // Cerrar cualquier panel de marcas abierto
      document.querySelectorAll('.filter-group-panel').forEach(p => p.remove());
      document.querySelectorAll('.filter-group-chip').forEach(c => {
        c.classList.remove('active');
        c.style.background = '';
      });

      if (isOpen) {
        // Si toco el mismo grupo, lo cierro
        activeGroup = null;
        activeFilter = 'TODOS';
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        todosChip.classList.add('active');
        render();
        return;
      }

      activeGroup = group.label;
      groupChip.classList.add('active');
      groupChip.style.background = group.color + '22';

      // Construir el panel de marcas dentro del grupo
      const panel = document.createElement('div');
      panel.className = 'filter-group-panel';
      panel.style.borderColor = group.color + '44';

      group.brands.forEach(brand => {
        const chip = document.createElement('button');
        chip.className = 'filter-sub-chip';
        chip.textContent = brand.label;
        chip.style.setProperty('--chip-color', group.color);
        if (activeFilter === brand.key) chip.classList.add('active');

        chip.onclick = (e) => {
          e.stopPropagation();
          activeFilter = brand.key;
          panel.querySelectorAll('.filter-sub-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          render();
        };
        panel.appendChild(chip);
      });

      filterRow.parentElement.insertBefore(panel, filterRow.nextSibling);
      render();
    };

    filterRow.appendChild(groupChip);
  });
}

function onSearch() {
  query = document.getElementById('searchInput').value;
  document.getElementById('clearBtn').style.display = query ? 'block' : 'none';
  render();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  query = '';
  document.getElementById('clearBtn').style.display = 'none';
  render();
}

function render() {
  const q = query.toLowerCase().trim();

  filtered = db.filter(p => {
    const desc = (p.desc || '').toUpperCase();
    const sku = formatSku(p.sku || '');
    const matchQ = !q || desc.toLowerCase().includes(q) || sku.includes(q);
    const matchF = activeFilter === 'TODOS' || desc.includes(activeFilter);
    return matchQ && matchF;
  });

  document.getElementById('resultsText').innerHTML =
    '<span class="results-count">' + filtered.length + '</span> productos encontrados';

  const list = document.getElementById('list');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty"><div class="big">🔍</div><h3>Sin resultados</h3><p>Intentá con otra búsqueda</p></div>';
    return;
  }

  list.innerHTML = filtered.map((p, i) => {
    const pisos = p.pisos != null ? p.pisos : '—';
    const packsPiso = p.packsPiso != null ? p.packsPiso : '—';
    const packsPaleta = p.packsPaleta != null ? p.packsPaleta : '—';
    return `<div class="card" onclick="openDetail(${db.indexOf(p)})">
      <div class="card-sku">
        <div class="sku-label">SKU</div>
        <div class="sku-val">${formatSku(p.sku)}</div>
      </div>
      <div class="card-body">
        <div class="card-desc">${p.desc || 'Sin descripción'}</div>
        <div class="card-pills">
          <div class="pill">🏗 Pisos <span class="val">${pisos}</span></div>
          <div class="pill">📦 /Piso <span class="val">${packsPiso}</span></div>
          <div class="pill">🎯 Total <span class="val">${packsPaleta}</span></div>
        </div>
      </div>
      <div class="card-arrow">›</div>
    </div>`;
  }).join('');
}

// ---- VENTANA DE DETALLE DEL PRODUCTO ----
function openDetail(idx) {
  currentIdx = idx;
  const p = db[idx];
  document.getElementById('mSku').textContent = 'SKU ' + formatSku(p.sku);
  document.getElementById('mDesc').textContent = p.desc || 'Sin descripción';
  document.getElementById('mPisos').textContent = p.pisos != null ? p.pisos : '—';
  document.getElementById('mPacksPiso').textContent = p.packsPiso != null ? p.packsPiso : '—';
  document.getElementById('mPacksPaleta').textContent = p.packsPaleta != null ? p.packsPaleta : '—';

  // Dibujo visual de la paleta
  const vp = document.getElementById('visualPaleta');
  if (p.pisos && p.pisos > 0) {
    const pisos = p.pisos;
    const MAX_PISOS_SHOWN = 20;
    const clampedPisos = Math.min(pisos, MAX_PISOS_SHOWN);

    // Dimensiones del dibujo SVG
    const W = 160, baseH = 18;
    const pisoH = 14; // altura de cada capa/piso
    const palletH = 12; // altura de la base de la paleta
    const svgH = clampedPisos * pisoH + palletH + baseH + 10;

    // Colores del dibujo
    const colors = {
      boxTop:    '#f5a623',
      boxFront:  '#c47f0d',
      boxSide:   '#e0941a',
      palletTop: '#8b6914',
      palletFront:'#5a420d',
      palletSide:'#7a5810',
    };

    // Dibujar cada piso como una capa rectangular con efecto 3D
    const depth = 18; // profundidad lateral en píxeles
    const boxW = W - depth;
    const startY = 8;

    let layers = '';
    for (let i = 0; i < clampedPisos; i++) {
      const y = startY + (clampedPisos - 1 - i) * pisoH;
      const isTop = (i === clampedPisos - 1);
      // Cara frontal del piso
      layers += `<rect x="${depth}" y="${y + 2}" width="${boxW}" height="${pisoH - 1}" fill="${colors.boxFront}" rx="1"/>`;
      // Cara superior (solo visible en el piso de arriba)
      if (isTop) {
        layers += `<polygon points="${depth},${y + 2} ${W},${y + 2} ${W - depth + depth/2},${y + 2 - depth/2 + 2} ${depth/2},${y + 2 - depth/2 + 2}" fill="${colors.boxTop}"/>`;
      }
      // Cara lateral del piso
      layers += `<polygon points="${W},${y + 2} ${W},${y + pisoH} ${W - depth + depth},${y + pisoH} ${W - depth + depth},${y + 2}" fill="${colors.boxSide}" opacity="0.7"/>`;
      // Línea separadora entre pisos
      layers += `<line x1="${depth}" y1="${y + 2}" x2="${W}" y2="${y + 2}" stroke="#0f0f14" stroke-width="0.5" opacity="0.4"/>`;
    }

    // Base de madera de la paleta
    const palletY = startY + clampedPisos * pisoH;
    layers += `<rect x="${depth}" y="${palletY}" width="${boxW}" height="${palletH}" fill="${colors.palletFront}" rx="1"/>`;
    layers += `<polygon points="${depth},${palletY} ${W},${palletY} ${W},${palletY} ${depth},${palletY}" fill="${colors.palletTop}"/>`;
    // Efecto de tablones de la paleta
    for (let s = 0; s < 3; s++) {
      const sx = depth + (boxW / 4) * (s + 0.8);
      layers += `<rect x="${sx}" y="${palletY}" width="6" height="${palletH}" fill="#3a2000" opacity="0.25"/>`;
    }
    // Cara superior de la paleta
    layers += `<polygon points="${depth},${palletY} ${W},${palletY} ${W - depth/2},${palletY - palletH/2 + 2} ${depth/2},${palletY - palletH/2 + 2}" fill="${colors.palletTop}"/>`;

    // Números de piso a la izquierda del dibujo
    let floorLabels = '';
    if (pisos <= MAX_PISOS_SHOWN) {
      // Mostrar todos los números de piso
      for (let i = 0; i < pisos; i++) {
        const y = startY + (pisos - 1 - i) * pisoH + pisoH / 2 + 2;
        floorLabels += `<text x="${depth - 4}" y="${y}" text-anchor="end" font-size="8" fill="#7878a0" font-family="Barlow Condensed, sans-serif" font-weight="600">${i + 1}</text>`;
      }
    } else {
      // Solo mostrar algunos números si hay muchos pisos
      [1, Math.ceil(pisos/2), pisos].forEach(n => {
        const idx = n - 1;
        const y = startY + (clampedPisos - 1 - Math.min(idx, clampedPisos - 1)) * pisoH + pisoH / 2 + 2;
        floorLabels += `<text x="${depth - 4}" y="${y}" text-anchor="end" font-size="8" fill="#7878a0" font-family="Barlow Condensed, sans-serif" font-weight="600">${n}</text>`;
      });
    }

    const truncNote = pisos > MAX_PISOS_SHOWN ? `<div style="font-size:11px;color:var(--muted);margin-top:4px;font-family:'Barlow Condensed',sans-serif">(mostrando ${MAX_PISOS_SHOWN} de ${pisos} pisos)</div>` : '';

    vp.innerHTML = `
      <div class="modal-section-title" style="padding:0 0 10px">VISTA DE PALETA</div>
      <div class="paleta-drawing">
        <div class="paleta-svg-wrap">
          <svg width="${W + 10}" height="${svgH}" viewBox="0 0 ${W + 10} ${svgH}" xmlns="http://www.w3.org/2000/svg">
            ${layers}
            ${floorLabels}
          </svg>
          ${truncNote}
        </div>
        <div class="paleta-legend">
          <div class="paleta-legend-item">
            <div class="paleta-legend-dot" style="background:${colors.boxFront}"></div>
            <div>
              <div style="font-size:14px">Pisos</div>
              <div class="paleta-legend-val">${pisos}</div>
            </div>
          </div>
          ${p.packsPiso ? `<div class="paleta-legend-item">
            <div class="paleta-legend-dot" style="background:var(--green)"></div>
            <div>
              <div style="font-size:14px">Bultos/piso</div>
              <div class="paleta-legend-val">${p.packsPiso}</div>
            </div>
          </div>` : ''}
          ${p.packsPaleta ? `<div class="paleta-legend-item">
            <div class="paleta-legend-dot" style="background:var(--accent)"></div>
            <div>
              <div style="font-size:14px">Total paleta</div>
              <div class="paleta-legend-val">${p.packsPaleta}</div>
            </div>
          </div>` : ''}
        </div>
      </div>`;
  } else {
    vp.innerHTML = '';
  }

  document.getElementById('detailModal').classList.add('open');
  // Mostrar editar/eliminar solo si es administrador
  document.getElementById('adminActions').style.display = isAdmin ? 'flex' : 'none';
}

function closeModal(e, id) {
  if (e.target.classList.contains('modal-overlay')) closeModalById(id);
}

function closeModalById(id) {
  document.getElementById(id).classList.remove('open');
}

// ---- FORMULARIO AGREGAR / EDITAR PRODUCTO ----
// Calcular automáticamente el total de bultos por paleta
['fPisos','fPacksPiso'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    const p = parseInt(document.getElementById('fPisos').value) || 0;
    const pp = parseInt(document.getElementById('fPacksPiso').value) || 0;
    document.getElementById('fPacksPaleta').value = p && pp ? p * pp : '';
  });
});

function openAdd() {
  editIdx = -1;
  document.getElementById('formTitle').textContent = 'NUEVO PRODUCTO';
  document.getElementById('fSku').value = '';
  document.getElementById('fDesc').value = '';
  document.getElementById('fPisos').value = '';
  document.getElementById('fPacksPiso').value = '';
  document.getElementById('fPacksPaleta').value = '';
  document.getElementById('fSku').readOnly = false;
  document.getElementById('formModal').classList.add('open');
}

function openEdit(idx) {
  closeModalById('detailModal');
  editIdx = idx;
  const p = db[idx];
  document.getElementById('formTitle').textContent = 'EDITAR PRODUCTO';
  document.getElementById('fSku').value = p.sku;
  document.getElementById('fDesc').value = p.desc || '';
  document.getElementById('fPisos').value = p.pisos != null ? p.pisos : '';
  document.getElementById('fPacksPiso').value = p.packsPiso != null ? p.packsPiso : '';
  document.getElementById('fPacksPaleta').value = p.packsPaleta != null ? p.packsPaleta : '';
  document.getElementById('fSku').readOnly = true;
  document.getElementById('formModal').classList.add('open');
}

async function saveProduct() {
  const sku = document.getElementById('fSku').value.trim();
  const desc = document.getElementById('fDesc').value.trim();
  const pisos = parseInt(document.getElementById('fPisos').value) || null;
  const packsPiso = parseInt(document.getElementById('fPacksPiso').value) || null;
  const packsPaleta = parseInt(document.getElementById('fPacksPaleta').value) || null;

  if (!sku || !desc) { showToast('⚠️ SKU y descripción son requeridos'); return; }

  if (editIdx >= 0) {
    db[editIdx] = { sku, desc, pisos, packsPiso, packsPaleta };
    showToast('✅ Producto actualizado');
  } else {
    if (db.find(p => p.sku === sku)) { showToast('⚠️ Ya existe ese SKU'); return; }
    db.unshift({ sku, desc, pisos, packsPiso, packsPaleta });
    showToast('✅ Producto agregado');
  }
  closeModalById('formModal');
  render();
  await saveData();

async function deleteProduct(idx) {
  if (!confirm('¿Eliminar este producto?')) return;
  db.splice(idx, 1);
  await saveData();
  closeModalById('detailModal');
  showToast('🗑️ Producto eliminado');
  render();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ---- EXPORTAR CSV ----
function exportCSV() {
  // Encabezados de la tabla
  const headers = ['SKU', 'Descripcion', 'PisosPorPaleta', 'PacksPorPiso', 'PacksPorPaleta'];

  // Convertir cada producto a una fila CSV
  const rows = db
    .filter(p => p.sku && p.sku !== 'NaN' && p.desc !== 'nan')
    .map(p => [
      formatSku(p.sku),
      '"' + (p.desc || '').replace(/"/g, '""') + '"',
      p.pisos != null ? p.pisos : '',
      p.packsPiso != null ? p.packsPiso : '',
      p.packsPaleta != null ? p.packsPaleta : ''
    ].join(','));

  // Armar el contenido del archivo
  const csvContent = [headers.join(','), ...rows].join('\n');

  // Crear el archivo y descargarlo
  const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  const fecha = new Date().toISOString().slice(0, 10);
  link.href = url;
  link.download = 'productos_sku_' + fecha + '.csv';
  link.click();
  URL.revokeObjectURL(url);
  showToast('✅ CSV exportado correctamente');
}

// ---- INICIO DE LA APLICACIÓN ----
iniciarApp();
</script>
