<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Buscador SKU</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f14; --surface: #1a1a24; --card: #22222f;
  --accent: #f5a623; --text: #e8e8f0; --muted: #7878a0;
  --border: #2e2e42; --green: #2dd4a0; --modal-bg: #181820;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }

/* HEADER */
.header {
  background: linear-gradient(135deg, #1a1a24 0%, #0f0f18 100%);
  border-bottom: 2px solid var(--accent);
  padding: 16px 16px 0;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 4px 24px rgba(0,0,0,0.6);
}
.header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.logo { width: 40px; height: 40px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.header-title h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 800; color: var(--text); letter-spacing: 1px; line-height: 1; }
.header-title p { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
.header-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }

.search-wrap { position: relative; margin-bottom: 14px; }
.search-wrap input {
  width: 100%; padding: 13px 46px 13px 44px;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 12px; color: var(--text); font-size: 17px;
  font-family: 'Barlow', sans-serif; outline: none; transition: border-color .2s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--muted); }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 20px; color: var(--muted); pointer-events: none; }
.clear-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 4px; display: none; }

/* FILTROS */
.filters-wrap { overflow-x: auto; padding-bottom: 14px; scrollbar-width: none; }
.filters-wrap::-webkit-scrollbar { display: none; }
.filter-row { display: flex; gap: 8px; width: max-content; }
.chip {
  padding: 7px 16px; border-radius: 20px; border: 1.5px solid var(--border);
  background: var(--surface); color: var(--muted); font-size: 14px;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
  letter-spacing: 1px; cursor: pointer; white-space: nowrap; transition: all .2s;
}
.chip.active { color: #000 !important; border-color: transparent !important; font-weight: 800; }
.sub-panel { display: none; padding: 10px 0 14px; }
.sub-panel.open { display: block; animation: fadeIn .2s; }
.sub-row { display: flex; gap: 6px; flex-wrap: wrap; }
.sub-chip {
  padding: 5px 12px; border-radius: 16px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); font-size: 13px;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
  cursor: pointer; transition: all .15s;
}
.sub-chip.active { border-color: transparent; color: #000; font-weight: 800; }
@keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }

/* RESULTS */
.results-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 16px; border-bottom: 1px solid var(--border);
  font-size: 13px; color: var(--muted); letter-spacing: 1px;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700; text-transform: uppercase;
}

/* LIST */
.list { padding: 8px 0 80px; }
.card {
  display: flex; align-items: center; padding: 14px 16px;
  border-bottom: 1px solid var(--border); cursor: pointer;
  transition: background .15s; gap: 12px;
}
.card:active { background: var(--surface); }
.sku-col { min-width: 70px; }
.sku-label { font-size: 11px; color: var(--muted); font-family: 'Barlow Condensed', sans-serif; letter-spacing: 1px; text-transform: uppercase; }
.sku-val { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 800; color: var(--accent); line-height: 1; }
.card-body { flex: 1; min-width: 0; }
.card-desc { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; color: var(--text); line-height: 1.2; word-break: break-word; margin-bottom: 6px; }
.pills { display: flex; gap: 6px; flex-wrap: wrap; }
.pill {
  padding: 3px 9px; border-radius: 8px; font-size: 13px;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
  background: var(--surface); border: 1px solid var(--border); color: var(--muted);
}
.pill span { color: var(--text); }
.card-arrow { color: var(--border); font-size: 18px; flex-shrink: 0; }

/* EMPTY */
.empty { padding: 60px 20px; text-align: center; }
.empty .big { font-size: 48px; margin-bottom: 12px; }
.empty h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; color: var(--muted); }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7);
  z-index: 200; display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity .25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--modal-bg); border-radius: 24px 24px 0 0;
  padding: 16px 20px 40px; width: 100%;
  max-height: 92vh; overflow-y: auto;
  transform: translateY(100%); transition: transform .3s cubic-bezier(.32,1,.4,1);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.modal-sku-badge { background: var(--accent); color: #000; font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 800; padding: 4px 14px; border-radius: 8px; }
.modal-close { background: var(--surface); border: none; color: var(--muted); font-size: 20px; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.modal-title { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 800; color: var(--text); line-height: 1.1; margin-bottom: 16px; }
.modal-divider { height: 1px; background: var(--border); margin: 16px 0; }
.modal-section-title { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 10px; text-align: center; }
.stat-card.highlight { border-color: var(--green); background: rgba(45,212,160,.08); }
.stat-val { font-family: 'Barlow Condensed', sans-serif; font-size: 40px; font-weight: 800; color: var(--green); line-height: 1; }
.stat-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }
.visual-paleta { margin: 16px 0; display: flex; justify-content: center; }
.modal-actions { display: flex; gap: 10px; }
.btn-edit { flex: 1; padding: 14px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; cursor: pointer; }
.btn-delete { padding: 14px 18px; background: var(--surface); border: 1.5px solid #e05; color: #e05; border-radius: 12px; font-size: 20px; cursor: pointer; }

/* FORM MODAL */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
.form-group input { width: 100%; padding: 12px 14px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-size: 17px; font-family: 'Barlow', sans-serif; outline: none; transition: border-color .2s; }
.form-group input:focus { border-color: var(--accent); }
.btn-save { width: 100%; padding: 16px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800; cursor: pointer; margin-top: 4px; }

/* LOGIN MODAL */
.login-input { width: 100%; padding: 16px; background: var(--surface); border: 2px solid var(--border); border-radius: 12px; color: var(--text); font-size: 20px; font-family: 'Barlow', sans-serif; text-align: center; letter-spacing: 4px; outline: none; transition: border-color .2s; margin: 16px 0; }
.login-input:focus { border-color: var(--accent); }
.login-input.error { border-color: #e05; animation: shake .3s; }
.login-icon { font-size: 48px; text-align: center; margin: 8px 0; }
.login-title { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 800; text-align: center; }
.login-sub { font-size: 14px; color: var(--muted); text-align: center; margin-top: 4px; }
.btn-login { width: 100%; padding: 16px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 800; cursor: pointer; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

/* BUTTONS */
.add-btn {
  background: var(--accent); border: none; border-radius: 10px; color: #000;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 16px;
  padding: 0 14px; height: 42px; cursor: pointer; display: none;
  align-items: center; gap: 5px; flex-shrink: 0;
}
.export-btn {
  background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px;
  color: var(--green); font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
  font-size: 14px; padding: 0 12px; height: 42px; cursor: pointer; display: none;
  align-items: center; gap: 5px; flex-shrink: 0; white-space: nowrap;
}
.export-btn:active { transform: scale(0.96); }
.admin-btn {
  background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px;
  color: var(--muted); font-size: 20px; width: 42px; height: 42px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .2s;
}
.admin-btn.active { border-color: var(--accent); color: var(--accent); }

/* TOAST */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: #2a2a3a; color: var(--text); padding: 12px 22px; border-radius: 24px;
  font-size: 15px; z-index: 999; transition: transform .3s; white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,.5); border: 1px solid var(--border);
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">📦</div>
    <div class="header-title">
      <h1>Buscador SKU</h1>
      <p>Sistema de Productos</p>
    </div>
    <div class="header-actions">
      <button class="add-btn" id="addBtn" onclick="openAdd()" style="display:none">+ Nuevo</button>
      <button class="export-btn" id="exportBtn" onclick="exportarJSON()" style="display:none" title="Descargar JSON">⬇️ JSON</button>
      <button class="admin-btn" id="loginBtn" onclick="toggleAdmin()">🔒</button>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar por descripción, SKU o marca..." oninput="onSearch(this.value)">
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
  </div>
  <div class="filters-wrap">
    <div class="filter-row" id="filterRow"></div>
    <div class="sub-panel" id="subPanel"></div>
  </div>
</div>

<div class="results-bar">
  <span id="resultsText">Cargando...</span>
  <span style="color:var(--muted);font-size:13px">SKU BÚSQUEDA</span>
</div>

<div class="list" id="list"></div>

<!-- DETALLE -->
<div class="modal-overlay" id="detailModal" onclick="closeModal(event,'detailModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-sku-badge" id="mSku"></span>
      <button class="modal-close" onclick="closeModalById('detailModal')">✕</button>
    </div>
    <div class="modal-title" id="mDesc"></div>
    <div class="modal-divider"></div>
    <div class="modal-section-title">DETALLE DE PALETA</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val" id="mPisos">—</div><div class="stat-lbl">Pisos por Paleta</div></div>
      <div class="stat-card"><div class="stat-val" id="mPacksPiso">—</div><div class="stat-lbl">Bultos por Piso</div></div>
      <div class="stat-card highlight"><div class="stat-val" id="mPacksPaleta">—</div><div class="stat-lbl">Total Paleta</div></div>
    </div>
    <div class="visual-paleta" id="visualPaleta"></div>
    <div class="modal-divider"></div>
    <div class="modal-actions" id="adminActions" style="display:none">
      <button class="btn-edit" onclick="openEdit(currentIdx)">✏️ Editar producto</button>
      <button class="btn-delete" onclick="deleteProduct(currentIdx)">🗑️</button>
    </div>
  </div>
</div>

<!-- FORMULARIO -->
<div class="modal-overlay" id="formModal" onclick="closeModal(event,'formModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-sku-badge" id="formTitle">NUEVO PRODUCTO</span>
      <button class="modal-close" onclick="closeModalById('formModal')">✕</button>
    </div>
    <div style="height:16px"></div>
    <div class="form-group"><label>Código SKU</label><input type="text" id="fSku" placeholder="Ej: 12345"></div>
    <div class="form-group"><label>Descripción</label><input type="text" id="fDesc" placeholder="Ej: QUILMES CLASICA X24 340CC"></div>
    <div class="form-group"><label>Pisos por Paleta</label><input type="number" id="fPisos" placeholder="Ej: 7" oninput="calcTotal()"></div>
    <div class="form-group"><label>Bultos por Piso</label><input type="number" id="fPacksPiso" placeholder="Ej: 10" oninput="calcTotal()"></div>
    <div class="form-group"><label>Total Bultos por Paleta</label><input type="number" id="fPacksPaleta" placeholder="Se calcula automático"></div>
    <button class="btn-save" onclick="saveProduct()">💾 Guardar Producto</button>
  </div>
</div>

<!-- LOGIN -->
<div class="modal-overlay" id="loginModal" onclick="closeModal(event,'loginModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="login-icon" id="loginIcon">🔐</div>
    <div class="login-title" id="loginTitle">Acceso Admin</div>
    <div class="login-sub" id="loginSub">Ingresá la contraseña para editar</div>
    <input type="password" class="login-input" id="loginInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-login" onclick="doLogin()">Ingresar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ---- CONFIGURACIÓN ----
const STORAGE_KEY = 'catalogo_sku_v2';
const JSON_URL    = 'productos.json';
const ADMIN_PASS  = 'cdmercado26';

// ---- FILTROS ----
const FILTER_GROUPS = [
  { label:'CERVEZAS', color:'#f5a623', brands:[
    {label:'Quilmes',key:'QUILMES'},{label:'Brahma',key:'BRAHMA'},
    {label:'Stella',key:'STELLA'},{label:'Patagonia',key:'PATAGONIA'},
    {label:'Andes',key:'ANDES'},{label:'Budweiser',key:'BUDWEISER'},
    {label:'Corona',key:'CORONA'},{label:'Temple',key:'TEMPLE'},
    {label:'Goose',key:'GOOSE'},{label:'Leffe',key:'LEFFE'},
    {label:'Franziskaner',key:'FRANZISK'},{label:'Hoegaarden',key:'HOEGAARD'},
  ]},
  { label:'GASEOSAS', color:'#2dd4a0', brands:[
    {label:'Pepsi',key:'PEPSI'},{label:'7UP',key:'7UP'},
    {label:'Mirinda',key:'MIRINDA'},{label:'H2OH',key:'H2OH'},
    {label:'Guaraná',key:'GUAR'},{label:'Tónica',key:'TONIC'},
  ]},
  { label:'AGUA/HIDRA', color:'#60c9f5', brands:[
    {label:'Glaciar',key:'GLACIAR'},{label:'Eco de los Andes',key:'ECO'},
    {label:'NPV/Nestlé',key:'NPV'},{label:'Gatorade',key:'GATORADE'},
    {label:'Rockstar',key:'ROCKSTAR'},{label:'Red Bull',key:'RED BULL'},
  ]},
  { label:'SIDRA/VINO', color:'#d97aff', brands:[
    {label:'Sidra 1930',key:'1930'},{label:'Del Valle',key:'DEL VALLE'},
    {label:'Malbec',key:'MALBEC'},{label:'Dante',key:'DANTE'},
    {label:'Novecento',key:'NOVECENTO'},{label:'Robino',key:'ROBINO'},
    {label:"Mike's",key:'MIKE'},{label:'Striptiz',key:'STRIPTIZ'},
  ]},
  { label:'ESPIRITUOSOS', color:'#ff9060', brands:[
    {label:'Gin Bosque',key:'BOSQUE'},{label:'Vodka',key:'VODKA'},
    {label:'Fernet',key:'FERNET'},{label:'Campari',key:'CAMPARI'},
    {label:'Aperol',key:'APEROL'},{label:'Jäger',key:'JAGER'},
    {label:'Martini',key:'MARTINI'},
  ]},
  { label:'ALIMENTOS', color:'#ffd460', brands:[
    {label:'Yerba',key:'YERBA'},{label:'Taragüi',key:'TARAGUI'},
    {label:'Playadito',key:'PLAYADITO'},{label:'Amanda',key:'AMANDA'},
    {label:'Pringles',key:'PRINGLES'},{label:'Nesquik',key:'NESQUIK'},
    {label:'Leche',key:'LECHE'},{label:'Jugo',key:'JUGO'},
    {label:'Café',key:'CAFE'},{label:'Morixe',key:'MORIXE'},
    {label:'Arroz',key:'ARROZ'},
  ]},
];

// ---- ESTADO ----
let db = [];
let isAdmin = false;
let activeFilter = 'TODOS';
let activeGroup  = null;
let currentIdx   = -1;
let editIdx      = -1;
let query        = '';

// ---- FORMATO SKU ----
function formatSku(sku) { return String(sku).replace(/\./g,''); }

// ---- INICIO ----
async function iniciarApp() {
  // Intentar cargar desde JSON (GitHub Pages)
  try {
    const resp = await fetch(JSON_URL + '?v=' + Date.now());
    if (!resp.ok) throw new Error('no json');
    const data = await resp.json();
    if (Array.isArray(data) && data.length > 0) {
      db = data;
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); } catch(e) {}
    } else throw new Error('empty');
  } catch(e) {
    // Fallback: localStorage
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) { db = JSON.parse(saved); }
    } catch(e2) {}
  }
  buildFilters();
  render();
}

function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); } catch(e) {}
}

// ---- FILTROS UI ----
function buildFilters() {
  const row = document.getElementById('filterRow');
  row.innerHTML = '';

  // TODOS
  const t = document.createElement('button');
  const todosActive = activeFilter==='TODOS' && !activeGroup;
  t.className = 'chip' + (todosActive?' active':'');
  t.textContent = 'TODOS';
  if (todosActive) { t.style.background='#f5a623'; t.style.color='#000'; }
  t.onclick = () => { activeFilter='TODOS'; activeGroup=null; document.getElementById('subPanel').innerHTML=''; document.getElementById('subPanel').classList.remove('open'); buildFilters(); render(); };
  row.appendChild(t);

  // Grupos con su color
  FILTER_GROUPS.forEach(g => {
    const btn = document.createElement('button');
    const isActive = activeGroup===g.label;
    btn.className = 'chip' + (isActive?' active':'');
    btn.textContent = g.label;
    if (isActive) {
      btn.style.background = g.color;
      btn.style.color = '#000';
      btn.style.borderColor = 'transparent';
    } else {
      // Color de borde sutil con el color del grupo
      btn.style.borderColor = g.color + '55';
      btn.style.color = g.color;
    }
    btn.onclick = () => toggleGroup(g);
    row.appendChild(btn);
  });
}

function buildSubChips(g) {
  const panel = document.getElementById('subPanel');
  panel.innerHTML = '';
  panel.classList.add('open');
  const row = document.createElement('div'); row.className = 'sub-row';
  g.brands.forEach(b => {
    const btn = document.createElement('button');
    const isActive = activeFilter === b.key;
    btn.className = 'sub-chip' + (isActive?' active':'');
    btn.textContent = b.label;
    if (isActive) {
      btn.style.background = g.color;
      btn.style.color = '#000';
    } else {
      btn.style.borderColor = g.color + '55';
      btn.style.color = g.color;
    }
    btn.onclick = () => { activeFilter = b.key; buildSubChips(g); render(); };
    row.appendChild(btn);
  });
  panel.appendChild(row);
}

function toggleGroup(g) {
  const panel = document.getElementById('subPanel');
  if (activeGroup === g.label) {
    activeGroup = null; activeFilter = 'TODOS';
    panel.innerHTML = ''; panel.classList.remove('open');
    buildFilters(); render(); return;
  }
  activeGroup = g.label; activeFilter = 'TODOS';
  buildSubChips(g);
  buildFilters();
  render();
}

function renderSubChips(g) { buildSubChips(g); }

// ---- BÚSQUEDA ----
function onSearch(val) {
  query = val.trim().toUpperCase();
  document.getElementById('clearBtn').style.display = val ? 'block' : 'none';
  render();
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  query = ''; render();
}

// ---- RENDER ----
function getFiltered() {
  return db.filter(p => {
    if (!p.sku || String(p.sku)==='NaN' || p.desc==='nan') return false;
    const desc = (p.desc||'').toUpperCase();
    const sku  = formatSku(p.sku);
    if (query && !desc.includes(query) && !sku.includes(query)) return false;
    if (activeFilter !== 'TODOS' && !desc.includes(activeFilter.toUpperCase())) return false;
    return true;
  });
}

function render() {
  const list = document.getElementById('list');
  const filtered = getFiltered();
  document.getElementById('resultsText').innerHTML =
    `<strong style="color:var(--text)">${filtered.length}</strong> PRODUCTOS ENCONTRADOS`;

  if (!filtered.length) {
    list.innerHTML = '<div class="empty"><div class="big">🔍</div><h3>Sin resultados</h3></div>';
    return;
  }
  list.innerHTML = filtered.map((p,i) => {
    const idx = db.indexOf(p);
    const sku = formatSku(p.sku);
    const pisos = p.pisos ?? '—';
    const piso  = p.packsPiso ?? '—';
    const total = p.packsPaleta ?? '—';
    return `<div class="card" onclick="openDetail(${idx})">
      <div class="sku-col">
        <div class="sku-label">SKU</div>
        <div class="sku-val">${sku}</div>
      </div>
      <div class="card-body">
        <div class="card-desc">${p.desc||''}</div>
        <div class="pills">
          <div class="pill">🏢 Pisos <span>${pisos}</span></div>
          <div class="pill">📦 /Piso <span>${piso}</span></div>
          <div class="pill">🟢 Total <span>${total}</span></div>
        </div>
      </div>
      <div class="card-arrow">›</div>
    </div>`;
  }).join('');
}

// ---- DETALLE ----
function openDetail(idx) {
  currentIdx = idx;
  const p = db[idx];
  document.getElementById('mSku').textContent = formatSku(p.sku);
  document.getElementById('mDesc').textContent = p.desc || '';
  document.getElementById('mPisos').textContent = p.pisos ?? '—';
  document.getElementById('mPacksPiso').textContent = p.packsPiso ?? '—';
  document.getElementById('mPacksPaleta').textContent = p.packsPaleta ?? '—';
  document.getElementById('visualPaleta').innerHTML = drawPaleta(p.pisos||0, p.packsPiso||0);
  document.getElementById('adminActions').style.display = isAdmin ? 'flex' : 'none';
  document.getElementById('detailModal').classList.add('open');
}

function drawPaleta(pisos, packsPiso) {
  if (!pisos) return '';
  const W=280, pisoH=14, depth=18, palletH=12;
  const totalH = pisos*pisoH + depth + palletH + 60;
  const startY = 30;
  let svg = `<svg width="${W}" height="${totalH}" viewBox="0 0 ${W} ${totalH}">`;
  const baseX=60, baseW=160;
  const cols=['#3a6bc4','#2a5aaa','#1a4990'];
  for(let i=0;i<pisos;i++){
    const y=startY+(pisos-1-i)*pisoH;
    const frontColor=cols[i%cols.length];
    svg+=`<rect x="${baseX}" y="${y}" width="${baseW}" height="${pisoH}" fill="${frontColor}" stroke="#0a2060" stroke-width="0.5"/>`;
    if(i===pisos-1){
      const pts=`${baseX},${y} ${baseX+depth},${y-depth} ${baseX+baseW+depth},${y-depth} ${baseX+baseW},${y}`;
      svg+=`<polygon points="${pts}" fill="#4a7fd4" stroke="#0a2060" stroke-width="0.5"/>`;
    }
    const sideY=y, sideH=pisoH;
    const sidePts=`${baseX+baseW},${sideY} ${baseX+baseW+depth},${sideY-depth} ${baseX+baseW+depth},${sideY-depth+sideH} ${baseX+baseW},${sideY+sideH}`;
    svg+=`<polygon points="${sidePts}" fill="#1a3a80" stroke="#0a2060" stroke-width="0.5"/>`;
    if(i<pisos-1) svg+=`<line x1="${baseX}" y1="${y}" x2="${baseX+baseW}" y2="${y}" stroke="#0a2060" stroke-width="0.3"/>`;
    if((i+1)%5===0||pisos<=10||i===pisos-1){
      svg+=`<text x="${baseX-6}" y="${y+pisoH/2+4}" text-anchor="end" font-size="10" fill="#7878a0" font-family="Barlow Condensed,sans-serif">${i+1}</text>`;
    }
  }
  const palY = startY + pisos*pisoH;
  svg+=`<rect x="${baseX-4}" y="${palY}" width="${baseW+8}" height="${palletH}" fill="#8B6914" stroke="#5a4008" stroke-width="0.5"/>`;
  for(let s=0;s<4;s++){
    const sx=baseX-4+(s*(baseW+8)/3);
    svg+=`<line x1="${sx}" y1="${palY}" x2="${sx}" y2="${palY+palletH}" stroke="#5a4008" stroke-width="1"/>`;
  }
  svg+=`</svg>`;
  return svg;
}

// ---- ADMIN ----
function toggleAdmin() {
  if (isAdmin) {
    isAdmin = false; applyAdminUI(); showToast('🔒 Sesión cerrada');
  } else {
    document.getElementById('loginInput').value='';
    document.getElementById('loginInput').classList.remove('error');
    document.getElementById('loginIcon').textContent='🔐';
    document.getElementById('loginTitle').textContent='Acceso Admin';
    document.getElementById('loginSub').textContent='Ingresá la contraseña para editar';
    document.getElementById('loginModal').classList.add('open');
    setTimeout(()=>document.getElementById('loginInput').focus(),200);
  }
}

function doLogin() {
  const val = document.getElementById('loginInput').value;
  if (val === ADMIN_PASS) {
    isAdmin = true;
    document.getElementById('loginModal').classList.remove('open');
    applyAdminUI();
    showToast('✅ Modo administrador activo');
  } else {
    const inp = document.getElementById('loginInput');
    inp.classList.add('error'); inp.value='';
    document.getElementById('loginIcon').textContent='❌';
    document.getElementById('loginSub').textContent='Contraseña incorrecta';
    setTimeout(()=>{ inp.classList.remove('error'); document.getElementById('loginIcon').textContent='🔐'; },1500);
  }
}

function applyAdminUI() {
  const addBtn    = document.getElementById('addBtn');
  const exportBtn = document.getElementById('exportBtn');
  const loginBtn  = document.getElementById('loginBtn');
  const adminAct  = document.getElementById('adminActions');
  if (isAdmin) {
    addBtn.style.display='flex'; exportBtn.style.display='flex';
    loginBtn.textContent='🔓'; loginBtn.classList.add('active');
    if(adminAct) adminAct.style.display='flex';
  } else {
    addBtn.style.display='none'; exportBtn.style.display='none';
    loginBtn.textContent='🔒'; loginBtn.classList.remove('active');
    if(adminAct) adminAct.style.display='none';
  }
}

// ---- CRUD ----
function openAdd() {
  editIdx=-1;
  document.getElementById('formTitle').textContent='NUEVO PRODUCTO';
  document.getElementById('fSku').value='';
  document.getElementById('fDesc').value='';
  document.getElementById('fPisos').value='';
  document.getElementById('fPacksPiso').value='';
  document.getElementById('fPacksPaleta').value='';
  document.getElementById('formModal').classList.add('open');
}

function openEdit(idx) {
  editIdx=idx;
  const p=db[idx];
  document.getElementById('formTitle').textContent='EDITAR PRODUCTO';
  document.getElementById('fSku').value=formatSku(p.sku);
  document.getElementById('fDesc').value=p.desc||'';
  document.getElementById('fPisos').value=p.pisos||'';
  document.getElementById('fPacksPiso').value=p.packsPiso||'';
  document.getElementById('fPacksPaleta').value=p.packsPaleta||'';
  closeModalById('detailModal');
  document.getElementById('formModal').classList.add('open');
}

function calcTotal() {
  const p=parseInt(document.getElementById('fPisos').value)||0;
  const b=parseInt(document.getElementById('fPacksPiso').value)||0;
  if(p&&b) document.getElementById('fPacksPaleta').value=p*b;
}

function saveProduct() {
  const sku=document.getElementById('fSku').value.trim();
  const desc=document.getElementById('fDesc').value.trim().toUpperCase();
  const pisos=parseInt(document.getElementById('fPisos').value)||null;
  const packsPiso=parseInt(document.getElementById('fPacksPiso').value)||null;
  const packsPaleta=parseInt(document.getElementById('fPacksPaleta').value)||null;
  if (!sku||!desc) { showToast('⚠️ SKU y descripción son requeridos'); return; }
  if (editIdx>=0) {
    db[editIdx]={sku,desc,pisos,packsPiso,packsPaleta};
    showToast('✅ Producto actualizado');
  } else {
    if (db.find(p=>formatSku(p.sku)===sku)) { showToast('⚠️ Ya existe ese SKU'); return; }
    db.unshift({sku,desc,pisos,packsPiso,packsPaleta});
    showToast('✅ Producto agregado');
  }
  saveData();
  closeModalById('formModal');
  render();
}

function deleteProduct(idx) {
  if (!confirm('¿Eliminar este producto?')) return;
  db.splice(idx,1);
  saveData();
  closeModalById('detailModal');
  showToast('🗑️ Producto eliminado');
  render();
}

// ---- EXPORTAR JSON ----
function exportarJSON() {
  const blob = new Blob([JSON.stringify(db, null, 2)], {type:'application/json;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='productos.json'; a.click();
  URL.revokeObjectURL(url);
  showToast('✅ productos.json descargado — subilo a GitHub');
}

// ---- MODALES ----
function closeModal(e, id) { if(e.target.classList.contains('modal-overlay')) closeModalById(id); }
function closeModalById(id) { document.getElementById(id).classList.remove('open'); }

// ---- TOAST ----
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ---- INICIO ----
iniciarApp();
</script>
